<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Day 13 - API Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

background:linear-gradient(-45deg,#0f172a,#1e293b,#312e81,#7c3aed);
background-size:400% 400%;
animation:bg 12s ease infinite;
min-height:100vh;
padding:40px;
color:white;

}

@keyframes bg{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.container{

max-width:1400px;
margin:auto;

}

.header{

background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
padding:25px;
border-radius:20px;
text-align:center;
margin-bottom:30px;
box-shadow:0 20px 40px rgba(0,0,0,.35);

}

.header h1{

font-size:38px;
color:#facc15;

}

.header p{

margin-top:10px;
color:#ddd;

}

.topbar{

display:flex;
justify-content:space-between;
align-items:center;
margin-top:20px;

}

#clock{

font-size:18px;
font-weight:bold;
color:#38bdf8;

}

.themeBtn{

padding:10px 20px;
border:none;
border-radius:30px;
background:#facc15;
font-weight:bold;
cursor:pointer;
transition:.3s;

}

.themeBtn:hover{

transform:scale(1.05);

}

.stats{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;

}

.stat-card{

background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
padding:20px;
border-radius:18px;
text-align:center;
box-shadow:0 15px 30px rgba(0,0,0,.3);
transition:.4s;

}

.stat-card:hover{

transform:translateY(-8px);

}

.stat-card h3{

color:#facc15;
margin-bottom:10px;

}

.stat-card h2{

font-size:30px;

}

.search{

width:100%;
padding:15px;
border:none;
border-radius:12px;
margin-bottom:25px;
font-size:16px;

}

.users{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;

}

.user-card{

background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
padding:20px;
border-radius:18px;
box-shadow:0 15px 30px rgba(0,0,0,.3);
transition:.4s;

}

.user-card:hover{

transform:translateY(-8px);

}

.user-card h2{

color:#facc15;
margin-bottom:10px;

}

.user-card p{

margin:8px 0;
line-height:1.6;

}

.loading{

text-align:center;
font-size:24px;
margin:50px;
color:#facc15;

}

.error{

text-align:center;
color:#ef4444;
font-size:22px;
margin:40px;

}

footer{

margin-top:40px;
text-align:center;
color:#ddd;

}

@media(max-width:768px){

.topbar{

flex-direction:column;
gap:15px;

}

.header h1{

font-size:30px;

}

}

</style>

</head>
<body>

<div class="container">

<!-- Header -->

<div class="header">

<h1>🌐 API Dashboard</h1>

<p>Frontend Development Internship • Week 3 • Day 13</p>

<div class="topbar">

<div id="clock">Loading Time...</div>

<button class="themeBtn" onclick="toggleTheme()">
🌙 Dark / ☀️ Light
</button>

</div>

</div>

<!-- Statistics -->

<div class="stats">

<div class="stat-card">

<h3>👥 Total Users</h3>

<h2 id="userCount">0</h2>

</div>

<div class="stat-card">

<h3>📝 Total Posts</h3>

<h2 id="postCount">0</h2>

</div>

<div class="stat-card">

<h3>💬 Total Comments</h3>

<h2 id="commentCount">0</h2>

</div>

</div>

<!-- Search -->

<input
type="text"
id="search"
class="search"
placeholder="🔍 Search User..."
onkeyup="searchUsers()">

<!-- Loading -->

<div id="loading" class="loading">

⏳ Loading Data...

</div>

<!-- Error -->

<div id="error" class="error" style="display:none;">

❌ Failed to Load Data

</div>

<!-- Users -->

<div class="users" id="usersContainer">

</div>

<footer>

<h3>Designed & Developed by Priya Ragade ❤️</h3>

<p>Frontend Developer Intern | Vertexon Technologies</p>

</footer>
<script>

// ================= LIVE CLOCK =================

function updateClock(){

let now = new Date();

document.getElementById("clock").innerHTML =
"📅 " + now.toLocaleDateString() +
"<br>🕒 " + now.toLocaleTimeString();

}

updateClock();
setInterval(updateClock,1000);

// ================= THEME TOGGLE =================

let dark=true;

function toggleTheme(){

if(dark){

document.body.style.background="#f3f4f6";
document.body.style.color="#111";

document.querySelectorAll(".header,.stat-card,.user-card").forEach(card=>{

card.style.background="white";
card.style.color="black";

});

dark=false;

}

else{

location.reload();

}

}

// ================= FETCH API =================

async function loadData(){

try{

const usersResponse=await fetch("https://jsonplaceholder.typicode.com/users");

const postsResponse=await fetch("https://jsonplaceholder.typicode.com/posts");

const commentsResponse=await fetch("https://jsonplaceholder.typicode.com/comments");

const users=await usersResponse.json();

const posts=await postsResponse.json();

const comments=await commentsResponse.json();

document.getElementById("loading").style.display="none";

document.getElementById("userCount").innerHTML=users.length;

document.getElementById("postCount").innerHTML=posts.length;

document.getElementById("commentCount").innerHTML=comments.length;

displayUsers(users);

}

catch(error){

document.getElementById("loading").style.display="none";

document.getElementById("error").style.display="block";

console.log(error);

}

}

// ================= DISPLAY USERS =================

function displayUsers(users){

let container=document.getElementById("usersContainer");

container.innerHTML="";

users.forEach(user=>{

container.innerHTML+=`

<div class="user-card">

<h2>👤 ${user.name}</h2>

<p><strong>📧 Email:</strong> ${user.email}</p>

<p><strong>📞 Phone:</strong> ${user.phone}</p>

<p><strong>🌐 Website:</strong> ${user.website}</p>

<p><strong>🏢 Company:</strong> ${user.company.name}</p>

<p><strong>📍 City:</strong> ${user.address.city}</p>

</div>

`;

});

}

// ================= SEARCH =================

function searchUsers(){

let value=document.getElementById("search").value.toLowerCase();

let cards=document.querySelectorAll(".user-card");

cards.forEach(card=>{

card.style.display=

card.innerText.toLowerCase().includes(value)

?"block":"none";

});

}

// ================= START =================

loadData();

</script>

</body>

</html>
