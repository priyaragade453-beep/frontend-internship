<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Day 12 - Premium To-Do App</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

background:linear-gradient(-45deg,#0f172a,#1e293b,#312e81,#7c3aed);
background-size:400% 400%;
animation:bg 12s ease infinite;
min-height:100vh;
padding:40px;
color:white;

}

@keyframes bg{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.container{

max-width:1400px;
margin:auto;

}

.header{

background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
padding:25px;
border-radius:20px;
text-align:center;
margin-bottom:30px;
box-shadow:0 20px 40px rgba(0,0,0,.35);

}

.header h1{

font-size:38px;
color:#facc15;

}

.header p{

margin-top:10px;
color:#ddd;

}

.topbar{

display:flex;
justify-content:space-between;
align-items:center;
margin-top:20px;

}

#clock{

font-size:18px;
font-weight:bold;
color:#38bdf8;

}

.themeBtn{

padding:10px 20px;
border:none;
border-radius:30px;
background:#facc15;
font-weight:bold;
cursor:pointer;
transition:.3s;

}

.themeBtn:hover{

transform:scale(1.05);

}

.stats{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;

}

.stat-card{

background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
padding:20px;
border-radius:18px;
text-align:center;
box-shadow:0 15px 30px rgba(0,0,0,.3);
transition:.4s;

}

.stat-card:hover{

transform:translateY(-8px);

}

.stat-card h3{

color:#facc15;
margin-bottom:10px;

}

.stat-card h2{

font-size:30px;

}

.main{

display:grid;
grid-template-columns:350px 1fr;
gap:25px;

}

.card{

background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
padding:25px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,.35);

}

.card h2{

text-align:center;
margin-bottom:20px;
color:#facc15;

}

.input{

width:100%;
padding:14px;
margin-bottom:15px;
border:none;
border-radius:10px;
font-size:16px;

}

select{

width:100%;
padding:14px;
margin-bottom:15px;
border:none;
border-radius:10px;
font-size:16px;

}

.btn{

width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#7c3aed;
color:white;
font-size:17px;
cursor:pointer;
font-weight:bold;
transition:.3s;

}

.btn:hover{

background:#9333ea;

}

.search{

width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-bottom:20px;
font-size:16px;

}

.task{

display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,.06);
padding:15px;
border-radius:12px;
margin-bottom:12px;

}

.task.completed{

opacity:.6;
text-decoration:line-through;

}

.priority-high{

color:#ef4444;
font-weight:bold;

}

.priority-medium{

color:#f59e0b;
font-weight:bold;

}

.priority-low{

color:#22c55e;
font-weight:bold;

}

.action-btn{

padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
margin-left:5px;
font-size:14px;

}

.complete{

background:#22c55e;
color:white;

}

.delete{

background:#ef4444;
color:white;

}

footer{

margin-top:40px;
text-align:center;
color:#ddd;

}

@media(max-width:900px){

.main{

grid-template-columns:1fr;

}

.topbar{

flex-direction:column;
gap:15px;

}

.header h1{

font-size:30px;

}

}

</style>

</head>
<body>

<div class="container">

<!-- HEADER -->

<div class="header">

<h1>📝 Premium To-Do App</h1>

<p>Frontend Development Internship • Week 3 • Day 12</p>

<div class="topbar">

<div id="clock">Loading Time...</div>

<button class="themeBtn" onclick="toggleTheme()">
🌙 Dark / ☀️ Light
</button>

</div>

</div>

<!-- Statistics -->

<div class="stats">

<div class="stat-card">

<h3>📋 Total Tasks</h3>

<h2 id="totalTasks">0</h2>

</div>

<div class="stat-card">

<h3>✅ Completed</h3>

<h2 id="completedTasks">0</h2>

</div>

<div class="stat-card">

<h3>⏳ Pending</h3>

<h2 id="pendingTasks">0</h2>

</div>

</div>

<!-- Main -->

<div class="main">

<!-- Left -->

<div class="card">

<h2>➕ Add New Task</h2>

<input
type="text"
id="taskInput"
class="input"
placeholder="Enter Task">

<select id="priority">

<option value="High">🔴 High Priority</option>

<option value="Medium">🟡 Medium Priority</option>

<option value="Low">🟢 Low Priority</option>

</select>

<button
class="btn"
onclick="addTask()">

Add Task

</button>

<br><br>

<button
class="btn"
style="background:#ef4444;"
onclick="clearCompleted()">

🧹 Clear Completed

</button>

</div>

<!-- Right -->

<div class="card">

<h2>📋 My Tasks</h2>

<input
type="text"
id="search"
class="search"
placeholder="🔍 Search Task..."
onkeyup="searchTask()">

<div id="taskList">

</div>

</div>

</div>

<footer>

<h3>Designed & Developed by Priya Ragade ❤️</h3>

<p>Frontend Developer Intern | Vertexon Technologies</p>

</footer>
<script>

let tasks=[];

// ================= LOAD SAVED TASKS =================

window.onload=function(){

let saved=localStorage.getItem("tasks");

if(saved){

tasks=JSON.parse(saved);

displayTasks();

}

updateClock();

setInterval(updateClock,1000);

}

// ================= SAVE TASKS =================

function saveTasks(){

localStorage.setItem("tasks",JSON.stringify(tasks));

}

// ================= ADD TASK =================

function addTask(){

let task=document.getElementById("taskInput").value.trim();

let priority=document.getElementById("priority").value;

if(task===""){

alert("Please enter a task.");

return;

}

tasks.push({

text:task,

priority:priority,

completed:false

});

saveTasks();

displayTasks();

document.getElementById("taskInput").value="";

}

// ================= DISPLAY TASKS =================

function displayTasks(){

let list=document.getElementById("taskList");

list.innerHTML="";

let completed=0;

tasks.forEach((task,index)=>{

if(task.completed) completed++;

let colorClass="priority-low";

if(task.priority==="High") colorClass="priority-high";

if(task.priority==="Medium") colorClass="priority-medium";

list.innerHTML+=`

<div class="task ${task.completed?'completed':''}">

<div>

<h3>${task.text}</h3>

<p class="${colorClass}">${task.priority} Priority</p>

</div>

<div>

<button class="action-btn complete"

onclick="completeTask(${index})">

${task.completed?"↩":"✅"}

</button>

<button class="action-btn delete"

onclick="deleteTask(${index})">

🗑️

</button>

</div>

</div>

`;

});

document.getElementById("totalTasks").innerHTML=tasks.length;

document.getElementById("completedTasks").innerHTML=completed;

document.getElementById("pendingTasks").innerHTML=tasks.length-completed;

}

// ================= COMPLETE =================

function completeTask(index){

tasks[index].completed=!tasks[index].completed;

saveTasks();

displayTasks();

}

// ================= DELETE =================

function deleteTask(index){

if(confirm("Delete this task?")){

tasks.splice(index,1);

saveTasks();

displayTasks();

}

}

// ================= SEARCH =================

function searchTask(){

let value=document.getElementById("search").value.toLowerCase();

let cards=document.querySelectorAll(".task");

cards.forEach(card=>{

card.style.display=

card.innerText.toLowerCase().includes(value)

?"flex":"none";

});

}

// ================= CLEAR COMPLETED =================

function clearCompleted(){

tasks=tasks.filter(task=>!task.completed);

saveTasks();

displayTasks();

}

// ================= CLOCK =================

function updateClock(){

let now=new Date();

document.getElementById("clock").innerHTML=

"📅 "+now.toLocaleDateString()

+"<br>🕒 "+now.toLocaleTimeString();

}

// ================= THEME =================

let dark=true;

function toggleTheme(){

if(dark){

document.body.style.background="#f3f4f6";

document.body.style.color="#111";

document.querySelectorAll(".card,.stat-card,.header").forEach(el=>{

el.style.background="white";

el.style.color="black";

});

dark=false;

}

else{

location.reload();

}

}

</script>

</body>

</html>
